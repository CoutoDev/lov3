<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pegue os corações 💕</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <audio src="audio/espera.wav" loading="eager" loop autoplay></audio>

        <div class="header">
            <div>
                <span class="score-label">Score:</span>
                <span class="score" id="score">0</span>
            </div>
            <div class="title">💕 Pegue os corações 💕</div>
        </div>
        
        <canvas id="gameCanvas"></canvas>
        
        <div class="start-screen" id="startScreen">
            <h1>💕 Pegue os corações 💕</h1>
            <p>Toque nos corações para capturá-los!</p>
            <button class="start-btn" id="startBtn">Começar</button>
        </div>

        <div class="start-screen" id="winScreen" style="display: none;">
            <h1>Parabéns, meu amor 🎉💕</h1>
            <p>Você chegou em 300 pontos🌟</p>
            <p>Te amo 🐛🐢❤️</p>
            <button class="start-btn" onclick="document.getElementById('winScreen').style.display = 'none'; document.getElementById('loveScreen').style.display = 'flex';">Ver recompensa</button>
        </div>

        <div class="start-screen" id="loveScreen" style="display: none;">
            <picture>
                <img src="images/colagem.jpg" alt="Us" width="300">
            </picture>
            <p>Te amo 🐛🐢❤️</p>
            <button class="start-btn" onclick="location.reload()">Jogar novamente</button>
        </div>
    </div>

    <script type="module" src="game.js"></script>
</body>
</html>
